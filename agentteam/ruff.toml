# Ruff configuration for AgentTeam
# Ignoring some pedantic rules that generate many false positives in this codebase

line-length = 120

[lint]
# Ignore these rules that generate too many false positives
ignore = [
    "F811",   # Redefinition of unused name - many intentional redefinitions
    "F821",   # Undefined name - some are forward references in type hints
    "E402",   # Module level import not at top of file - some intentional late imports
    "E721",   # Use `is` for type comparisons - cosmetic
    "E731",   # Lambda assignment - cosmetic choice
    "E741",   # Ambiguous variable name - cosmetic
    "W291",   # Trailing whitespace - cosmetic, in SQL strings
    "W293",   # Blank line contains whitespace - cosmetic, in SQL strings
    "F823",   # Local variable referenced before assignment - need review
    "F401",   # Unused import - too many, need bulk clean up
    "F541",   # f-string without placeholder - some intentional
    "F841",   # Local variable assigned but never used - many intentional patterns
    "E722",   # Bare except - common pattern in this codebase
]

[lint.per-file-ignores]
# Ignore unused imports in __init__.py files (common pattern)
"*/__init__.py" = ["F401"]
# Ignore these rules in test files
"tests/*" = ["F401", "F811", "E402"]
